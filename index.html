<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchange-O-Gram</title>
    <meta name="description" content="The ORIGINAL photo-sharing app from 2013 because Instagram was too mainstream">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: bohrder-box; }
        :root {
            --bg: #0a0a0a; --card-bg: #141414; --accent: #e8443a;
            --accent-glow: rgba(232, 68, 58, 0.3); --text: #f0ece4;
            --text-muted: #8a8680; --border: #2a2a2a;
        }
        body { font-family: 'Source Sans Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 1000; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 24px; }
        header { padding: 40px 0 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.8rem, 4vw, 2.4rem); letter-spacing: 6px; text-transform: uppercase; color: var(--text); }
        .logo span { color: var(--accent); }
        .hero { text-align: center; padding: 80px 0 60px; position: relative; }
        .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 10vw, 7rem); line-height: 0.95; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; animation: fadeUp 0.8s ease-out; }
        .hero h1 .highlight { color: var(--accent); position: relative; display: inline-block; }
        .hero h1 .highlight::after { content: ''; position: absolute; bottom: 4px; left: 0; right: 0; height: 4px; background: var(--accent); opacity: 0.4; }
        .hero-sub { font-size: clamp(1rem, 2.5vw, 1.3rem); color: var(--text-muted); margin-top: 20px; letter-spacing: 1px; animation: fadeUp 0.8s ease-out 0.2s both; }
        .tagline-card { background: var(--card-bg); border: 1px solid var(--border); border-left: 4px solid var(--accent); padding: 40px; margin: 0 0 50px; animation: fadeUp 0.8s ease-out 0.4s both; }
        .tagline-card p { font-size: clamp(1.1rem, 2vw, 1.35rem); line-height: 1.6; color: var(--text); }
        .tagline-card .emoji { font-size: 1.4em; margin-left: 6px; }
        .quote-section { margin: 0 0 60px; padding: 30px 40px; position: relative; animation: fadeUp 0.8s ease-out 0.6s both; }
        .quote-section::before { content: '"'; font-family: 'Bebas Neue', sans-serif; font-size: 8rem; color: var(--accent); opacity: 0.2; position: absolute; top: -30px; left: 10px; line-height: 1; }
        .quote-text { font-style: italic; font-size: clamp(1.1rem, 2vw, 1.3rem); line-height: 1.6; color: var(--text); margin-bottom: 12px; }
        .quote-attribution { color: var(--text-muted); font-size: 0.95rem; letter-spacing: 1px; }
        .quote-attribution strong { color: var(--accent); font-weight: 600; }
        .video-section { margin: 0 0 80px; animation: fadeUp 0.8s ease-out 0.8s both; }
        .video-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 4px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 20px; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border: 1px solid var(--border); background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        footer { border-top: 1px solid var(--border); padding: 30px 0; text-align: center; color: var(--text-muted); font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .tagline-card, .quote-section { padding: 24px; } .hero { padding: 50px 0 40px; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">Exchange<span>-O-</span>Gram</div>
        </div>
    </header>
    <main class="container">
        <section class="hero">
            <h1>Welcome to<br><span class="highlight">Exchange-O-Gram!</span></h1>
            <p class="hero-sub">Est. 2013 — Before it was cool.</p>
        </section>
        <div class="tagline-card">
            <p>The ORIGINAL photo-sharing app from 2013 because Instagram was too mainstream <span class="emoji">😂</span></p>
        </div>
        <div class="quote-section">
            <p class="quote-text">"It's like Instagram but it's an EXCHANGE!"</p>
            <p class="quote-attribution"><strong>Billy</strong> (Vince Vaughn) — The Internship</p>
        </div>
        <div class="video-section">
            <p class="video-label">The Scene That Started It All</p>
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/jxvdsdGavq0" 
                    title="The Internship - Exchange-O-Gram" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>
    </main>
    <footer>
        <div class="container">
            Exchange-O-Gram &copy; 2025
        </div>
    </footer>
</body>
</html>
